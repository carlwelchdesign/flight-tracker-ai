name: flight-tracker-ai

services:
  database:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flight_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-flight_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flight_tracker}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-flight_tracker} -d ${POSTGRES_DB:-flight_tracker}"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: cargo run --locked -p flight-tracker-api
    environment:
      API_BIND_ADDRESS: 0.0.0.0:8080
      APP_ENV: development
      AUTH_MODE: ${AUTH_MODE:-development}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-local-development-internal-auth-secret-change-me}
      INTERNAL_AUTH_KEY_ID: ${INTERNAL_AUTH_KEY_ID:-local-primary}
      INTERNAL_AUTH_PREVIOUS_KEY_ID: ${INTERNAL_AUTH_PREVIOUS_KEY_ID:-}
      INTERNAL_AUTH_PREVIOUS_SECRET: ${INTERNAL_AUTH_PREVIOUS_SECRET:-}
      AUTH_ASSERTION_ISSUER: ${AUTH_ASSERTION_ISSUER:-flight-tracker-web}
      AUTH_ASSERTION_AUDIENCE: ${AUTH_ASSERTION_AUDIENCE:-flight-tracker-api}
      DEV_AUTH_OPERATOR_ID: ${DEV_AUTH_OPERATOR_ID:-9c704a09-a62c-43d5-bac6-94ea2fd53b32}
      DEV_AUTH_OPERATOR_CODE: ${DEV_AUTH_OPERATOR_CODE:-SIM}
      DEV_AUTH_OPERATOR_NAME: ${DEV_AUTH_OPERATOR_NAME:-Simulation Operator}
      DEV_AUTH_TENANT_ID: ${DEV_AUTH_TENANT_ID:-local-flight-tracker}
      DEV_AUTH_SUBJECT: ${DEV_AUTH_SUBJECT:-local-admin}
      DEV_AUTH_DISPLAY_NAME: ${DEV_AUTH_DISPLAY_NAME:-Local Administrator}
      DEV_AUTH_ROLE: ${DEV_AUTH_ROLE:-administrator}
      ENABLE_REPLAY_CONTROLS: "true"
      REPLAY_SCENARIO_PATH: /workspace/fixtures/replay/m1-operations-v1.json
      ENABLE_NOAA_WEATHER: ${ENABLE_NOAA_WEATHER:-false}
      NOAA_OPERATOR_ID: ${NOAA_OPERATOR_ID:-9c704a09-a62c-43d5-bac6-94ea2fd53b32}
      NOAA_METAR_STATIONS: ${NOAA_METAR_STATIONS:-KSFO,KOAK,KSJC}
      NOAA_POLL_INTERVAL_SECONDS: ${NOAA_POLL_INTERVAL_SECONDS:-60}
      NOAA_USER_AGENT: ${NOAA_USER_AGENT:-flight-tracker-ai/0.1 (+https://github.com/carlwelchdesign/flight-tracker-ai)}
      DATABASE_URL: postgres://${POSTGRES_USER:-flight_tracker}:${POSTGRES_PASSWORD:-flight_tracker}@database:5432/${POSTGRES_DB:-flight_tracker}
      RUST_LOG: flight_tracker_api=info
      CARGO_HOME: /cargo
      CARGO_TARGET_DIR: /target
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - cargo_registry:/cargo/registry
      - cargo_git:/cargo/git
      - cargo_target:/target
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: apps/web
      target: development
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      API_BASE_URL: http://api:8080
      AUTH_MODE: ${AUTH_MODE:-development}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-local-development-internal-auth-secret-change-me}
      INTERNAL_AUTH_KEY_ID: ${INTERNAL_AUTH_KEY_ID:-local-primary}
      AUTH_ASSERTION_ISSUER: ${AUTH_ASSERTION_ISSUER:-flight-tracker-web}
      AUTH_ASSERTION_AUDIENCE: ${AUTH_ASSERTION_AUDIENCE:-flight-tracker-api}
      DEV_AUTH_TENANT_ID: ${DEV_AUTH_TENANT_ID:-local-flight-tracker}
      DEV_AUTH_SUBJECT: ${DEV_AUTH_SUBJECT:-local-admin}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:${WEB_PORT:-3001}:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  cargo_registry:
  cargo_git:
  cargo_target:
  web_node_modules:
  web_next_cache:
