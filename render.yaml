services:
  - type: web
    name: flight-tracker-api
    runtime: docker
    plan: free
    region: virginia
    repo: https://github.com/carlwelchdesign/flight-tracker-ai
    # FT-404 is verified from its feature branch before the release PR merges.
    # Change both service branches to main in the final promotion commit.
    branch: feat/ft-405-live-navigable-tracker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Production is promoted manually only after staging and browser smoke pass.
    autoDeployTrigger: "off"
    envVars:
      - key: API_BIND_ADDRESS
        value: 0.0.0.0:10000
      - key: APP_ENV
        value: production
      - key: AUTH_MODE
        value: clerk
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_AUTH_SECRET
        sync: false
      - key: INTERNAL_AUTH_KEY_ID
        value: portfolio-primary-2026-07
      - key: AUTH_ASSERTION_ISSUER
        value: flight-tracker-web
      - key: AUTH_ASSERTION_AUDIENCE
        value: flight-tracker-api
      - key: ENABLE_REPLAY_CONTROLS
        value: "false"
      - key: ENABLE_PORTFOLIO_REPLAY
        value: "true"
      - key: ENABLE_NOAA_WEATHER
        value: "true"
      - key: NOAA_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: PUBLIC_WEATHER_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: NOAA_METAR_STATIONS
        value: KSFO,KOAK,KSJC
      - key: NOAA_POLL_INTERVAL_SECONDS
        value: "60"
      - key: NOAA_USER_AGENT
        value: flight-tracker-ai/0.1 (+https://github.com/carlwelchdesign/flight-tracker-ai)
      - key: ENABLE_ADSB_LOL_POSITIONS
        value: "true"
      - key: ADSB_LOL_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: ADSB_LOL_LATITUDE
        value: "37.62"
      - key: ADSB_LOL_LONGITUDE
        value: "-122.38"
      - key: ADSB_LOL_RADIUS_NM
        value: "50"
      - key: ADSB_LOL_POLL_INTERVAL_SECONDS
        value: "30"
      - key: ADSB_LOL_USER_AGENT
        value: flight-tracker-ai/0.1 (+https://github.com/carlwelchdesign/flight-tracker-ai)
      - key: RUST_LOG
        value: flight_tracker_api=info

  # Render's managed preview environments require a paid workspace and do not
  # copy sync:false secrets. Keep a long-lived free staging service instead,
  # with its own Neon branch URL and internal assertion secret.
  - type: web
    name: flight-tracker-api-staging
    runtime: docker
    plan: free
    region: virginia
    repo: https://github.com/carlwelchdesign/flight-tracker-ai
    branch: feat/ft-405-live-navigable-tracker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: API_BIND_ADDRESS
        value: 0.0.0.0:10000
      - key: APP_ENV
        value: production
      - key: AUTH_MODE
        value: clerk
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_AUTH_SECRET
        sync: false
      - key: INTERNAL_AUTH_KEY_ID
        value: portfolio-primary-2026-07
      - key: AUTH_ASSERTION_ISSUER
        value: flight-tracker-web
      - key: AUTH_ASSERTION_AUDIENCE
        value: flight-tracker-api
      - key: ENABLE_REPLAY_CONTROLS
        value: "false"
      - key: ENABLE_PORTFOLIO_REPLAY
        value: "true"
      - key: ENABLE_NOAA_WEATHER
        value: "true"
      - key: NOAA_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: PUBLIC_WEATHER_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: NOAA_METAR_STATIONS
        value: KSFO,KOAK,KSJC
      - key: NOAA_POLL_INTERVAL_SECONDS
        value: "60"
      - key: NOAA_USER_AGENT
        value: flight-tracker-ai/0.1 (+https://github.com/carlwelchdesign/flight-tracker-ai)
      - key: ENABLE_ADSB_LOL_POSITIONS
        value: "true"
      - key: ADSB_LOL_OPERATOR_ID
        value: 9c704a09-a62c-43d5-bac6-94ea2fd53b32
      - key: ADSB_LOL_LATITUDE
        value: "37.62"
      - key: ADSB_LOL_LONGITUDE
        value: "-122.38"
      - key: ADSB_LOL_RADIUS_NM
        value: "50"
      - key: ADSB_LOL_POLL_INTERVAL_SECONDS
        value: "30"
      - key: ADSB_LOL_USER_AGENT
        value: flight-tracker-ai/0.1 (+https://github.com/carlwelchdesign/flight-tracker-ai)
      - key: RUST_LOG
        value: flight_tracker_api=info
