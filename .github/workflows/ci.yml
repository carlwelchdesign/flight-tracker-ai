name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: API and PostGIS smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: flight_tracker
          POSTGRES_USER: flight_tracker
          POSTGRES_PASSWORD: flight_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U flight_tracker -d flight_tracker"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Build API
        run: cargo build --locked -p flight-tracker-api
      - name: Start API
        env:
          DATABASE_URL: postgres://flight_tracker:flight_tracker@127.0.0.1:5432/flight_tracker
          API_BIND_ADDRESS: 127.0.0.1:8080
          APP_ENV: development
          ENABLE_REPLAY_CONTROLS: "true"
          REPLAY_SCENARIO_PATH: fixtures/replay/m1-operations-v1.json
        run: target/debug/flight-tracker-api > /tmp/flight-tracker-api.log 2>&1 &
      - name: Verify health and readiness
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/readiness > /tmp/readiness.json; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/flight-tracker-api.log
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8080/health | grep '"status":"ok"'
          grep '"postgis":"ok"' /tmp/readiness.json
      - name: Verify replay alert lifecycle
        run: |
          curl --fail --silent --request POST \
            --header 'content-type: application/json' \
            --data '{"speed":"8x"}' \
            http://127.0.0.1:8080/api/dev/replay/speed > /dev/null
          curl --fail --silent --request POST \
            http://127.0.0.1:8080/api/dev/replay/resume > /dev/null
          for attempt in {1..30}; do
            curl --fail --silent \
              'http://127.0.0.1:8080/api/alerts?operator_id=9c704a09-a62c-43d5-bac6-94ea2fd53b32' \
              > /tmp/alerts.json
            if grep --quiet '"alert_type":"route_hazard_proximity"' /tmp/alerts.json; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/alerts.json
              cat /tmp/flight-tracker-api.log
              exit 1
            fi
            sleep 1
          done
          python3 - <<'PY'
          import json
          with open('/tmp/alerts.json', encoding='utf-8') as source:
              alerts = json.load(source)['data']
          assert len(alerts) == 1
          alert = alerts[0]
          assert alert['attention_score'] == alert['evidence']['attention']['total']
          assert alert['score_version'] == 1
          assert alert['rule_version'] == 1
          with open('/tmp/alert-id', 'w', encoding='utf-8') as target:
              target.write(alert['id'])
          PY
          alert_id="$(< /tmp/alert-id)"
          curl --fail --silent --request POST \
            --header 'content-type: application/json' \
            --data '{"operator_id":"9c704a09-a62c-43d5-bac6-94ea2fd53b32","action":"acknowledge","actor_id":"dispatcher:ci","idempotency_key":"ci-replay-ack","comment":null}' \
            "http://127.0.0.1:8080/api/alerts/${alert_id}/actions" \
            > /tmp/alert-detail.json
          grep --quiet '"lifecycle":"acknowledged"' /tmp/alert-detail.json
          grep --quiet '"actor_id":"dispatcher:ci"' /tmp/alert-detail.json
      - name: Verify schema and route-rule contracts
        env:
          TEST_DATABASE_URL: postgres://flight_tracker:flight_tracker@127.0.0.1:5432/flight_tracker?sslmode=disable
        run: >-
          cargo test --locked -p flight-tracker-api
          --test schema_contract
          --test route_hazard_postgis_review
          -- --nocapture
